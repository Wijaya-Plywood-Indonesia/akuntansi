name: Akuntansi CI/CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

# ── ENV di JOB LEVEL — berlaku untuk SEMUA step ──────────────────────
# FIX: DB_HOST=127.0.0.1 (TCP), BUKAN localhost (Unix socket)
# Unix socket tidak tersedia di GitHub Actions runner
env:
  DB_CONNECTION: mysql
  DB_HOST: 127.0.0.1
  DB_PORT: 3306
  DB_DATABASE: laravel_testing
  DB_USERNAME: root
  DB_PASSWORD: password

jobs:
  laravel-tests:
    name: Run Tests (CI)
    runs-on: ubuntu-latest

    services:
      mariadb:
        image: mariadb:10.6
        env:
          MARIADB_ROOT_PASSWORD: password
          MARIADB_DATABASE: laravel_testing
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mbstring, dom, fileinfo, mysql, pdo_mysql, bcmath, gd
          coverage: none

      # ── FIX SKENARIO E ────────────────────────────────────────────
      # ubuntu-latest sudah punya MySQL 8.0 running di port 3306.
      # Ini conflict dengan MariaDB container → mysqladmin ping
      # berhasil tapi connect ke MySQL runner, bukan MariaDB container.
      - name: Stop MySQL bawaan Runner (cegah port conflict)
        run: |
          sudo systemctl stop mysql || true
          sudo systemctl disable mysql || true
          echo "✅ MySQL runner dihentikan"

      # ── Install mysql-client (FIX SKENARIO D) ────────────────────
      # Pastikan mysqladmin & mysql tersedia di runner
      - name: Install MySQL Client
        run: sudo apt-get install -y mysql-client

      # ── Cache vendor ──────────────────────────────────────────────
      - name: Cache Composer Dependencies
        id: composer-cache
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      # ── Install Dependencies ──────────────────────────────────────
      - name: Install Dependencies
        run: |
          composer require brianium/paratest --dev --no-interaction
          composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      # ── Prepare Environment (FIX SKENARIO B) ─────────────────────
      # key:generate SEBELUM wait DB — hindari artisan boot DB prematur.
      # sed override .env agar tidak bergantung pada .env.example.
      - name: Prepare Environment
        run: |
          php -r "file_exists('.env') || copy('.env.example', '.env');"
          php artisan key:generate --force

          sed -i "s|DB_HOST=.*|DB_HOST=127.0.0.1|g"              .env
          sed -i "s|DB_PORT=.*|DB_PORT=3306|g"                    .env
          sed -i "s|DB_DATABASE=.*|DB_DATABASE=laravel_testing|g" .env
          sed -i "s|DB_USERNAME=.*|DB_USERNAME=root|g"            .env
          sed -i "s|DB_PASSWORD=.*|DB_PASSWORD=password|g"        .env

          echo "── DB config aktif di .env ──"
          grep "^DB_" .env

          chmod -R 777 storage bootstrap/cache

      # ── Wait for Database (FIX SKENARIO A + F) ───────────────────
      # sleep 5 di awal = buffer setelah MySQL runner stop + MariaDB init.
      # mysqladmin ping = verifikasi koneksi nyata, bukan hanya port TCP.
      # mysql SELECT = double-check bisa kirim query sebelum migrate.
      - name: Wait for Database
        run: |
          echo "⏳ Buffer awal 5 detik..."
          sleep 5

          echo "🔍 Menunggu MariaDB siap..."
          for i in $(seq 1 30); do
            if mysqladmin ping -h 127.0.0.1 -P 3306 -u root -ppassword --silent 2>/dev/null; then
              echo "✅ MariaDB ping OK di percobaan ke-$i"
              break
            fi
            echo "   Percobaan $i/30 — tunggu 3 detik..."
            sleep 3
          done

          echo "🔍 Verifikasi koneksi dengan actual query..."
          mysql -h 127.0.0.1 -P 3306 -u root -ppassword \
            -e "SELECT VERSION() AS mariadb_version; SHOW DATABASES;" \
            laravel_testing

          echo "✅ Database siap"

      # ── Migrate & Test ────────────────────────────────────────────
      - name: Run Migrations & Tests
        run: |
          php artisan migrate:fresh --seed --force
          php artisan test --parallel --recreate-databases
