name: Akuntansi CI/CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  # ------------------------------------------------------------
  # JOB 1: TESTING (CI)
  # ------------------------------------------------------------
  laravel-tests:
    name: Run Tests (CI)
    runs-on: ubuntu-latest

    services:
      mariadb:
        image: mariadb:10.6
        env:
          MARIADB_ROOT_PASSWORD: password
          MARIADB_DATABASE: laravel_testing
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mbstring, dom, fileinfo, mysql, pdo_mysql, bcmath, gd
          # Cache composer dependencies
          coverage: none

      # ── Cache composer vendor ──────────────────────────────────
      # Jika composer.lock tidak berubah, skip install = CI lebih cepat
      - name: Cache Composer Dependencies
        id: composer-cache
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      # ── Install Dependencies ───────────────────────────────────
      # FIX: Gunakan `composer update` untuk paratest agar lock file ikut terupdate.
      # Tidak pakai --no-update karena itu yang menyebabkan lock file tidak sinkron.
      - name: Install Dependencies
        if: steps.composer-cache.outputs.cache-hit != 'true'
        run: |
          composer require brianium/paratest --dev --no-interaction
          composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      # ── Prepare Environment ────────────────────────────────────
      - name: Prepare Environment
        run: |
          php -r "file_exists('.env') || copy('.env.example', '.env');"
          php artisan key:generate
          chmod -R 777 storage bootstrap/cache

      # ── Wait for Database ──────────────────────────────────────
      # FIX: nc hanya cek port TCP terbuka, tapi MariaDB belum tentu
      # siap terima query. mysqladmin ping memastikan koneksi benar-benar ready.
      - name: Wait for Database
        run: |
          echo "Menunggu MariaDB benar-benar siap..."
          for i in $(seq 1 30); do
            if mysqladmin ping -h 127.0.0.1 -P 3306 -u root -ppassword --silent 2>/dev/null; then
              echo "MariaDB siap di percobaan ke-$i"
              break
            fi
            echo "Percobaan $i/30 — belum siap, tunggu 2 detik..."
            sleep 2
          done
          # Verifikasi final — pastikan bisa query sebelum migrate
          mysql -h 127.0.0.1 -P 3306 -u root -ppassword -e "SELECT 1;" laravel_testing

      # ── Run Migrations & Tests ─────────────────────────────────
      - name: Run Migrations & Tests
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: laravel_testing
          DB_USERNAME: root
          DB_PASSWORD: password
        run: |
          php artisan migrate:fresh --seed
          php artisan test --parallel --recreate-databases
