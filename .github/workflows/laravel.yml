name: Akuntansi CI/CD

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

jobs:
  # ──────────────────────────────────────────────
  # JOB 1: TESTING (CI)
  # ──────────────────────────────────────────────
  laravel-tests:
    name: 🧪 Run Tests (CI)
    runs-on: ubuntu-latest

    services:
      mariadb:
        image: mariadb:11.4
        env:
          MARIADB_ROOT_PASSWORD: password
          MARIADB_DATABASE: laravel_testing
          MARIADB_ROOT_HOST: "%"
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
          --health-start-period=30s

    env:
      DB_CONNECTION: mysql
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: laravel_testing
      DB_USERNAME: root
      DB_PASSWORD: password

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐘 Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mbstring, dom, fileinfo, mysql, pdo_mysql, bcmath, curl, zip, gd, intl
          coverage: none

      - name: 📦 Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-${{ runner.os }}-${{ hashFiles('**/composer.lock') }}
          restore-keys: composer-${{ runner.os }}-

      - name: 📋 Copy .env
        run: php -r "file_exists('.env') || copy('.env.example', '.env');"

      - name: 🔧 Install Composer dependencies
        run: composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      - name: 🔑 Generate App Key
        run: php artisan key:generate

      - name: 🔐 Set Permissions
        run: chmod -R 777 storage bootstrap/cache

      - name: ⏳ Wait for MariaDB to be fully ready
        run: |
          echo "Waiting for MariaDB to accept connections..."
          for i in $(seq 1 30); do
            if mysql -h 127.0.0.1 -P 3306 -u root -ppassword -e "SELECT 1;" laravel_testing > /dev/null 2>&1; then
              echo "✅ MariaDB is ready and accepting queries! (attempt $i)"
              exit 0
            fi
            echo "Attempt $i/30 - not ready yet, waiting 3s..."
            sleep 3
          done
          echo "❌ MariaDB did not become ready in time!"
          exit 1

      - name: ✅ Run Fresh Migration
        run: php artisan migrate:fresh --force --no-interaction

      - name: ✅ Verify No Pending Migrations
        run: |
          STATUS=$(php artisan migrate:status --no-ansi 2>&1)
          echo "$STATUS"
          if echo "$STATUS" | grep -q "Pending"; then
            echo "❌ Ada migration yang pending!"
            exit 1
          fi
          echo "✅ Semua migration sudah berjalan."

      - name: 🧪 Run Tests
        run: php artisan test --colors=always --stop-on-failure

  # ──────────────────────────────────────────────
  # JOB 2: CODE QUALITY
  # ──────────────────────────────────────────────
  code-quality:
    name: 🔍 Code Quality
    runs-on: ubuntu-latest
    needs: laravel-tests

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐘 Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mbstring, dom, fileinfo
          coverage: none

      - name: 📦 Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-${{ runner.os }}-${{ hashFiles('**/composer.lock') }}
          restore-keys: composer-${{ runner.os }}-

      - name: 🔧 Install Composer dependencies
        run: composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      - name: ✅ Check PHP Syntax
        run: find app config routes -name "*.php" | xargs php -l

      - name: ✅ Check Routes Load
        run: |
          php -r "file_exists('.env') || copy('.env.example', '.env');"
          php artisan key:generate
          php artisan route:list > /dev/null && echo "✅ Routes OK"

      - name: ✅ Check Config Cache
        run: |
          php artisan config:cache && echo "✅ Config cache OK"
          php artisan config:clear

      - name: ✅ Check View Compile
        run: |
          php artisan view:cache && echo "✅ View compile OK"
          php artisan view:clear

  # ──────────────────────────────────────────────
  # JOB 3: BUILD FRONTEND ASSETS
  # ──────────────────────────────────────────────
  build-assets:
    name: 🏗️ Build Frontend Assets
    runs-on: ubuntu-latest
    needs: laravel-tests

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: 📦 Install NPM dependencies
        run: npm ci

      - name: 🏗️ Build assets (production)
        run: npm run build

      - name: ✅ Verify build output
        run: |
          if [ ! -d "public/build" ]; then
            echo "❌ Build output tidak ditemukan di public/build!"
            exit 1
          fi
          echo "✅ Build berhasil."
          ls -la public/build/

  # ──────────────────────────────────────────────
  # JOB 4: SECURITY AUDIT
  # ──────────────────────────────────────────────
  security-audit:
    name: 🔒 Security Audit
    runs-on: ubuntu-latest
    needs: laravel-tests

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐘 Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          coverage: none

      - name: 📦 Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-${{ runner.os }}-${{ hashFiles('**/composer.lock') }}
          restore-keys: composer-${{ runner.os }}-

      - name: 🔧 Install Composer dependencies
        run: composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      - name: ✅ Composer security audit
        run: composer audit --no-interaction
        continue-on-error: true

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: 📦 Install NPM dependencies
        run: npm ci

      - name: ✅ NPM security audit
        run: npm audit --audit-level=high
        continue-on-error: true
