name: Akuntansi CI/CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  # ------------------------------------------------------------
  # JOB 1: TESTING (CI) - VERSI OPTIMASI MARIADB
  # ------------------------------------------------------------
  laravel-tests:
    name: Run Tests (CI)
    runs-on: ubuntu-latest
    
    services:
      mariadb:
        image: mariadb:10.6
        env:
          MARIADB_ROOT_PASSWORD: password
          MARIADB_DATABASE: laravel_testing
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mbstring, dom, fileinfo, mysql, pdo_mysql, bcmath, gd

      # 1. INSTALL DEPENDENCIES DULU (Agar folder 'vendor' dan 'autoload.php' ada)
      - name: Install Dependencies
        run: |
          composer require brianium/paratest --dev --no-update --no-interaction
          composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      # 2. BARU PREPARE ENVIRONMENT (Key generate butuh autoload.php)
      - name: Prepare Environment
        run: |
          php -r "file_exists('.env') || copy('.env.example', '.env');"
          php artisan key:generate
          chmod -R 777 storage bootstrap/cache

      # 3. TUNGGU DATABASE & RUN TEST
      - name: Wait for Database
        run: |
          until nc -z -v -w30 127.0.0.1 3306; do
            echo "Menunggu MariaDB siap..."
            sleep 2
          done

      - name: Run Migrations & Tests
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: laravel_testing
          DB_USERNAME: root
          DB_PASSWORD: password
        run: |
          php artisan migrate:fresh --seed
          php artisan test --parallel --recreate-databases
