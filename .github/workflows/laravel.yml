name: Akuntansi CI/CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

# ── ENV di JOB LEVEL ─────────────────────────────────────────────────
env:
  DB_CONNECTION: mysql
  DB_HOST: 127.0.0.1
  DB_PORT: 3306
  DB_DATABASE: laravel_testing
  DB_USERNAME: root
  DB_PASSWORD: password

jobs:
  laravel-tests:
    name: Run Tests (CI)
    runs-on: ubuntu-latest

    services:
      mariadb:
        image: mariadb:10.6
        env:
          MARIADB_ROOT_PASSWORD: password
          MARIADB_DATABASE: laravel_testing
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mbstring, dom, fileinfo, mysql, pdo_mysql, bcmath, gd
          coverage: none

      - name: Stop MySQL bawaan Runner
        run: |
          sudo systemctl stop mysql || true
          sudo systemctl disable mysql || true

      - name: Install MySQL Client
        run: sudo apt-get install -y mysql-client -qq

      - name: Cache Composer Dependencies
        id: composer-cache
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install Dependencies
        run: |
          composer require brianium/paratest --dev --no-interaction
          composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      # ── FIX UTAMA ─────────────────────────────────────────────────
      # JANGAN pakai sed — format .env.example bisa berbeda (spasi, quotes)
      # sehingga sed gagal silent tanpa error → DB_HOST tetap 'localhost'
      # 
      # Solusi: tulis ulang blok DB di .env dengan php -r
      # sehingga 100% pasti nilainya benar terlepas format asal
      - name: Prepare Environment
        run: |
          php -r "file_exists('.env') || copy('.env.example', '.env');"
          php artisan key:generate --force

          # Tulis ulang DB config via PHP — tidak bergantung format .env.example
          php -r "
            \$env = file_get_contents('.env');
            \$keys = [
              'DB_CONNECTION' => 'mysql',
              'DB_HOST'       => '127.0.0.1',
              'DB_PORT'       => '3306',
              'DB_DATABASE'   => 'laravel_testing',
              'DB_USERNAME'   => 'root',
              'DB_PASSWORD'   => 'password',
            ];
            foreach (\$keys as \$key => \$val) {
              if (preg_match('/^'.\$key.'=/m', \$env)) {
                \$env = preg_replace('/^'.\$key.'=.*/m', \$key.'='.\$val, \$env);
              } else {
                \$env .= PHP_EOL.\$key.'='.\$val;
              }
            }
            file_put_contents('.env', \$env);
          "

          # Hapus config cache agar Laravel tidak pakai nilai lama
          php artisan config:clear

          # ── DEBUG: print nilai DB yang BENAR-BENAR akan dipakai Laravel ──
          echo "── Isi .env (hanya baris DB_*) ──"
          grep "^DB_" .env

          echo "── Nilai yang dibaca php artisan ──"
          php artisan tinker --execute="
            echo 'DB_HOST: ' . config('database.connections.mysql.host') . PHP_EOL;
            echo 'DB_PORT: ' . config('database.connections.mysql.port') . PHP_EOL;
            echo 'DB_DATABASE: ' . config('database.connections.mysql.database') . PHP_EOL;
            echo 'DB_USERNAME: ' . config('database.connections.mysql.username') . PHP_EOL;
          "

          chmod -R 777 storage bootstrap/cache

      - name: Wait for Database
        run: |
          sleep 5
          echo "🔍 Menunggu MariaDB..."
          for i in $(seq 1 30); do
            if mysqladmin ping -h 127.0.0.1 -P 3306 -u root -ppassword --silent 2>/dev/null; then
              echo "✅ MariaDB siap di percobaan ke-$i"
              break
            fi
            echo "   Percobaan $i/30..."
            sleep 3
          done
          mysql -h 127.0.0.1 -P 3306 -u root -ppassword \
            -e "SELECT VERSION(); SHOW DATABASES;" laravel_testing

      - name: Run Migrations & Tests
        run: |
          php artisan migrate:fresh --seed --force
          php artisan test --parallel --recreate-databases
